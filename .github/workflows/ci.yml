name: Snowflake Capstone CI

on:
  push:
    branches: [ main, develop, "feature/**", "hotfix/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit detect-secrets

      - name: Run Bandit security scan
        run: |
          bandit -r config/ bronze_scripts/ silver_scripts/ gold_scripts/ exports/ \
            -ll -ii --skip B608 -f txt

      - name: Check for hardcoded secrets
        run: |
          detect-secrets scan \
            --exclude-files '.*\.(sql|csv|xlsx|docx|pdf|md)$' \
            > secrets_report.json
          cat secrets_report.json
          python - <<'EOF'
          import json, sys
          data = json.load(open("secrets_report.json"))
          findings = sum(len(v) for v in data.get("results", {}).values())
          if findings:
              print(f"FAIL: {findings} potential secret(s) detected — review secrets_report.json")
              sys.exit(1)
          print("OK: No hardcoded secrets detected.")
          EOF
