name: Snowflake Capstone CI

on:
  push:
    branches: [ main, develop, "feature/**", "hotfix/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit detect-secrets

      - name: Run Bandit security scan
        run: |
          bandit -r config/ bronze_scripts/ silver_scripts/ gold_scripts/ exports/ \
            -ll -ii -f txt || true

      - name: Check for hardcoded secrets
        run: |
          detect-secrets scan \
            --exclude-files '.*\.(pyc|csv|xlsx|docx|pdf|json)$' \
            --exclude-files '.git' \
            > secrets_report.json || true
          echo "Secrets scan complete."
          cat secrets_report.json || true
