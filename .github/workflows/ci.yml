name: Snowflake Capstone CI

on:
  push:
    branches: [ main, develop, "feature/**", "hotfix/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: pip install bandit detect-secrets

      - name: Run Bandit security scan
        run: |
          bandit -r config/ bronze_scripts/ silver_scripts/ gold_scripts/ exports/ \
            -ll -ii \
            --exclude ./venv \
            -f txt

      - name: Check for hardcoded secrets
        run: |
          detect-secrets scan \
            --exclude-files '.*\.pyc' \
            --exclude-files '__pycache__' \
            > /tmp/secrets_report.json
          python -c "
          import json, sys
          with open('/tmp/secrets_report.json') as f:
              data = json.load(f)
          results = data.get('results', {})
          if results:
              print('WARNING: Potential secrets found:')
              for path, findings in results.items():
                  for f in findings:
                      print(f'  {path} (line {f[\"line_number\"]}): {f[\"type\"]}')
          else:
              print('No hardcoded secrets detected.')
          "
