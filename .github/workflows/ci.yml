name: Snowflake Capstone CI

on:
  push:
    branches: [ main, develop, "feature/**", "hotfix/**" ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # ── 1. Lint & Syntax Check ─────────────────────────────────────────────────
  lint:
    name: Lint Python & SQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8 sqlfluff

      - name: Lint Python files
        run: |
          flake8 config/ bronze_scripts/ silver_scripts/ gold_scripts/ exports/ \
            --max-line-length=120 \
            --extend-ignore=E501 \
            --statistics

      - name: Lint SQL files (Snowflake dialect)
        run: |
          sqlfluff lint sql/ \
            --dialect snowflake \
            --rules L001,L002,L003,L006,L010,L011,L014,L017,L019,L022,L036 \
            --exclude-rules L031 \
            || true   # warn-only in CI; change to fail when baseline is clean

  # ── 2. Unit Tests ──────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
          pip install snowflake-connector-python pandas openpyxl || true

      - name: Run unit tests (mock-based, no Snowflake needed)
        run: |
          pytest tests/ -v --tb=short --ignore=tests/integration/ || true
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:    ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

  # ── 3. Security Scan ───────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r config/ bronze_scripts/ silver_scripts/ gold_scripts/ exports/ \
            -ll -ii \
            --exclude ./venv \
            -f txt || true

      - name: Check for hardcoded secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --baseline .secrets.baseline || true

  # ── 4. Integration Tests (only on develop / main) ─────────────────────────
  integration-tests:
    name: Integration Tests (Snowflake)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Snowflake connector
        run: pip install snowflake-connector-python pandas

      - name: Test Snowflake connectivity
        run: python config/snowflake_config.py
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}

      - name: Run Bronze → Silver → Gold pipeline (integration)
        if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
        run: |
          python bronze_scripts/load_to_bronze.py
          python bronze_scripts/profiling.py
          python silver_scripts/transform_to_silver.py
          python gold_scripts/load_dimensional.py
          python gold_scripts/load_facts.py
        env:
          SNOWFLAKE_ACCOUNT:  ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER:     ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
